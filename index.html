<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dhev – software developer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            margin-bottom: 1rem;
            line-height: 1;
            background: linear-gradient(135deg, #fff 0%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 8s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        p {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: #999;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .status {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .links {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        a {
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 0.75rem 0;
            position: relative;
            transition: color 0.3s ease;
        }

        a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: #fff;
            transition: width 0.3s ease;
        }

        a:hover {
            color: #ccc;
        }

        a:hover::after {
            width: 100%;
        }

        @media (max-width: 640px) {
            body {
                padding: 1.5rem;
            }

            .links {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>dhev</h1>
        <p>software developer</p>
        <div class="status">full portfolio coming soon</div>
        <div class="links">
            <a href="https://github.com/dhevdotdev" target="_blank" rel="noopener">github</a>
            <a href="https://www.linkedin.com/in/dhev-s/" target="_blank" rel="noopener">linkedin</a>
        </div>
    </div>
</body>
</html>
